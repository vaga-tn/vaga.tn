order: 1
metaTitle: "Devis, factures, bons de livraison — VAGA"
metaDescription: "Du devis à la facture, sans ressaisie. Devis, commandes, bons de livraison, factures et avoirs, achat et vente, tout tracé de bout en bout."
title: "Du devis à la facture, sans jamais ressaisir une ligne."
subhead: "Devis, commandes, bons de livraison, factures et avoirs — vente et achat — reliés entre eux avec une traçabilité complète."
card:
  title: "Facturation & documents"
  benefit: "Devis, commandes, BL, factures, avoirs — achat et vente."
fonctionnement:
  - label: "Cycle de vente complet"
    text: "Devis → Commande → Bon de Livraison → Facture → Avoir. Chaque document se transforme en le suivant en un clic, sans ressaisie, avec un horodatage de chaque transformation."
  - label: "Cycle d'achat symétrique"
    text: "Commande Fournisseur → Bon de Réception → Facture Fournisseur → Avoir Fournisseur."
  - label: "Documents complémentaires"
    text: "Bon de Sortie, Bon de Retour, Proforma."
  - label: "Calculs automatiques"
    text: "Sous-total HT, TVA, Timbre Fiscal, total TTC, montant payé, solde dû — recalculés à chaque ligne."
  - label: "États de facture"
    text: "Brouillon, envoyée — pour garder le contrôle avant l'envoi définitif."
  - label: "Avoirs tracés"
    text: "Chaque avoir est lié à la facture d'origine, avec le motif enregistré."
  - label: "Personnalisation"
    text: "Votre logo et des champs personnalisés sur vos documents."
pourquoi: "Contrairement à un tableur ou à un logiciel de facturation isolé, VAGA garde la chaîne complète : vous pouvez remonter d'une facture jusqu'au devis d'origine en un clic, avec chaque étape horodatée."
related:
  - label: "Gestion de stock"
    href: "/fonctionnalites/gestion-stock"
  - label: "Trésorerie"
    href: "/fonctionnalites/tresorerie"
  - label: "Clients & crédit"
    href: "/fonctionnalites/clients-credit"
faq:
  - q: "Puis-je personnaliser mes documents (logo, mentions) ?"
    a: "Oui, vous pouvez ajouter votre logo et des champs personnalisés sur vos documents."
  - q: "Les documents sont-ils exportables en PDF ?"
    a: "Oui, génération PDF prête à imprimer pour tous les documents."
  - q: "Le Timbre Fiscal est-il calculé automatiquement ?"
    a: "Oui, sur chaque facture."
